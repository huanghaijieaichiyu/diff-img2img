meta:
  name: small
  target_vram_gb: 8
  description: 8GB-safe preset prioritizing fit and stability.

runtime:
  train_profile: auto
  mixed_precision: fp16
  resolution: 256
  log_interval: 10
  num_workers: 4

model:
  architecture_scale: small
  use_retinex: true
  use_ema: true
  ema_decay: 0.9999
  prediction_type: v_prediction
  conditioning_space: hvi_lite
  inject_mode: film_pyramid
  condition_variant: small
  decom_variant: small
  base_condition_channels: 16
  decom_base_channels: 16
  unet_layers_per_block: 1
  unet_block_channels: [32, 64, 128, 192]
  unet_down_block_types: [DownBlock2D, DownBlock2D, DownBlock2D, AttnDownBlock2D]
  unet_up_block_types: [AttnUpBlock2D, UpBlock2D, UpBlock2D, UpBlock2D]
  enable_xformers_memory_efficient_attention: true

optimization:
  batch_size: 2
  gradient_accumulation_steps: 8
  lr: 1.0e-4
  lr_scheduler: constant_with_warmup
  lr_warmup_steps: 300
  grad_clip_norm: 3.0

loss:
  offset_noise: true
  offset_noise_scale: 0.1
  snr_gamma: 5.0
  retinex_loss_weight: 0.1
  tv_loss_weight: 0.1
  retinex_consistency_weight: 1.0
  retinex_exposure_weight: 0.1
  x0_loss_weight: 0.15
  x0_loss_t_max: 160
  x0_loss_warmup_steps: 1500
  residual_scale: 0.5

schedule:
  checkpointing_steps: 1000
  validation_steps: 500
  max_train_steps:
  freeze_decom_steps: 0
  decom_warmup_steps: 2000
  joint_retinex_ramp_steps: 1000

evaluation:
  num_inference_steps: 8
  benchmark_inference_steps: [8, 20]
  num_validation_images: 8
  semantic_backbone: none
  nr_metric: none
