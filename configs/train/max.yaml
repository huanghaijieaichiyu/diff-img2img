meta:
  name: max
  target_vram_gb: 64
  description: Official high-capacity preset for maximum restoration quality.

runtime:
  train_profile: auto
  mixed_precision: bf16
  resolution: 512
  log_interval: 10
  num_workers: 8
  prepare_on_train: true
  prepared_cache_dir:
  offline_variant_count: 3
  prepare_workers:
  prepare_force: false
  synthesis_seed: 42
  darker_ranges:

model:
  architecture_scale: max
  use_retinex: true
  use_ema: true
  ema_decay: 0.9999
  prediction_type: v_prediction
  conditioning_space: hvi_lite
  inject_mode: film_pyramid
  condition_variant: max
  decom_variant: max
  base_condition_channels: 48
  decom_base_channels: 48
  unet_layers_per_block: 3
  unet_block_channels: [64, 128, 256, 512, 768]
  unet_down_block_types: [DownBlock2D, AttnDownBlock2D, AttnDownBlock2D, AttnDownBlock2D, AttnDownBlock2D]
  unet_up_block_types: [AttnUpBlock2D, AttnUpBlock2D, AttnUpBlock2D, AttnUpBlock2D, UpBlock2D]
  enable_xformers_memory_efficient_attention: true

optimization:
  batch_size: 8
  gradient_accumulation_steps: 2
  lr: 1.0e-4
  lr_scheduler: constant_with_warmup
  lr_warmup_steps: 500
  grad_clip_norm: 5.0

loss:
  offset_noise: true
  offset_noise_scale: 0.1
  snr_gamma: 5.0
  retinex_loss_weight: 0.1
  tv_loss_weight: 0.1
  retinex_consistency_weight: 1.0
  retinex_exposure_weight: 0.1
  x0_loss_weight: 0.25
  x0_loss_t_max: 256
  x0_loss_warmup_steps: 300
  residual_scale: 0.5

schedule:
  checkpointing_steps: 500
  validation_steps: 500
  max_train_steps:
  freeze_decom_steps: 0
  decom_warmup_steps: 400
  joint_retinex_ramp_steps: 200

evaluation:
  num_inference_steps: 8
  benchmark_inference_steps: [8, 16]
  num_validation_images: 4
  semantic_backbone: resnet18
  nr_metric: niqe
