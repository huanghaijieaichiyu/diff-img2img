meta:
  name: middle
  target_vram_gb: 8
  description: Official recommended 8GB preset with NAF decomposition and deep-only cross-attention conditioning.

runtime:
  mixed_precision: fp16
  attention_backend: auto
  use_torch_compile: true
  torch_compile_mode: max-autotune-no-cudagraphs
  resolution: 256
  log_interval: 10
  num_workers: 4
  prefetch_factor: 4
  persistent_workers: true
  pin_memory: true
  decode_cache_size: 128
  opencv_threads_per_worker: 1

model:
  architecture_scale: middle
  use_retinex: true
  use_ema: true
  ema_decay: 0.9999
  prediction_type: v_prediction
  conditioning_space: hvi_lite
  inject_mode: concat_pyramid
  condition_variant: max_v2
  decom_variant: naf
  base_condition_channels: 32
  decom_base_channels: 32
  cond_out_channels: 7
  unet_layers_per_block: 2
  unet_block_channels: [32, 64, 128, 256]
  unet_down_block_types: [DownBlock2D, DownBlock2D, AttnDownBlock2D, AttnDownBlock2D]
  unet_up_block_types: [AttnUpBlock2D, AttnUpBlock2D, UpBlock2D, UpBlock2D]
  enable_torch_sdpa_memory_efficient_attention: true
  enable_gradient_checkpointing: true
  use_cfg: true
  cfg_drop_prob: 0.1

optimization:
  batch_size: 2
  gradient_accumulation_steps: 4
  lr: 1.0e-4
  lr_scheduler: cosine_with_warmup
  lr_warmup_steps: 500
  grad_clip_norm: 4.0
  use_grouped_lr: true

loss:
  offset_noise: true
  offset_noise_scale: 0.1
  snr_gamma: 5.0
  loss_weighting_scheme: min_snr
  use_uncertainty_weighting: false
  retinex_loss_weight: 0.1
  tv_loss_weight: 0.1
  retinex_consistency_weight: 1.0
  retinex_exposure_weight: 0.1
  frequency_loss_weight: 0.02
  edge_loss_weight: 0.03
  loss_balance_mode: ema
  loss_balance_decay: 0.98
  loss_balance_warmup_steps: 1000
  x0_loss_weight: 0.18
  x0_loss_t_max: 192
  x0_loss_warmup_steps: 400
  residual_scale: 0.5

schedule:
  checkpointing_steps: 1000
  validation_steps: 1000
  max_train_steps:
  stage1_decom_only_steps: 500
  stage2_adapter_steps: 500
  freeze_decom_steps: 1000
  decom_warmup_steps: 500
  joint_retinex_ramp_steps: 300

evaluation:
  num_inference_steps: 8
  benchmark_inference_steps: [8, 20]
  num_validation_images: 8
  semantic_backbone: none
  nr_metric: none
  guidance_scale: 1.5
