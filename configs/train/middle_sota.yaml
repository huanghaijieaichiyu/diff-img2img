meta:
  name: middle_sota
  target_vram_gb: 8
  description: Low-risk quality preset for 8GB VRAM - Min-SNR weighting, NAFNet decomposition, deep-only cross-attention, effective batch 16

runtime:
  train_profile: auto
  mixed_precision: fp16
  resolution: 256
  log_interval: 10
  num_workers: 4

model:
  architecture_scale: middle
  use_retinex: true
  use_ema: true
  ema_decay: 0.9999
  prediction_type: v_prediction
  conditioning_space: hvi_lite
  inject_mode: film_pyramid
  condition_variant: max_v2  # Deep-only cross-attention adapter
  decom_variant: naf  # P1: Use NAFNet-based decomposition
  base_condition_channels: 32
  decom_base_channels: 32
  unet_layers_per_block: 2
  unet_block_channels: [32, 64, 128, 256]
  unet_down_block_types: [DownBlock2D, DownBlock2D, AttnDownBlock2D, AttnDownBlock2D]
  unet_up_block_types: [AttnUpBlock2D, AttnUpBlock2D, UpBlock2D, UpBlock2D]
  enable_xformers_memory_efficient_attention: true

optimization:
  batch_size: 1
  gradient_accumulation_steps: 16
  lr: 1.0e-4
  lr_scheduler: cosine_with_warmup  # P0: Cosine annealing with warmup
  lr_warmup_steps: 500
  grad_clip_norm: 4.0

loss:
  offset_noise: true
  offset_noise_scale: 0.1
  snr_gamma: 5.0
  loss_weighting_scheme: min_snr
  use_uncertainty_weighting: false
  retinex_loss_weight: 0.1
  tv_loss_weight: 0.1
  retinex_consistency_weight: 1.0
  retinex_exposure_weight: 0.1
  x0_loss_weight: 0.18
  x0_loss_t_max: 192
  x0_loss_warmup_steps: 1800
  residual_scale: 0.5

schedule:
  checkpointing_steps: 1000
  validation_steps: 500
  max_train_steps:
  freeze_decom_steps: 0
  decom_warmup_steps: 2500
  joint_retinex_ramp_steps: 1500

evaluation:
  num_inference_steps: 8
  benchmark_inference_steps: [8, 20]
  num_validation_images: 12
  semantic_backbone: resnet18
  nr_metric: niqe
